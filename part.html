<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrickBot — Part Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">BrickBot</span>
      </a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="bench.html" class="nav-link nav-link-bench">My Bench<span class="bench-badge" id="bench-badge"></span></a>
        <a href="mystery.html" class="nav-link">Photo ID</a>
      </nav>
    </div>
  </header>

  <!-- Main content area -->
  <main class="part-page" id="part-page">
    <!-- Populated by JS -->
  </main>

  <!-- Buy Links (hidden until part loads) -->
  <section class="buy-links" id="buy-links" style="display:none;">
    <a id="bricklink-btn" class="buy-btn buy-btn--blue" href="#" target="_blank" rel="noopener">
      Find on BrickLink
    </a>
    <a id="amazon-btn" class="buy-btn buy-btn--green" href="#" target="_blank" rel="noopener">
      Search Amazon
    </a>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">BrickBot</span>
      </div>
      <p class="footer-credit">Built by Malakai</p>
      <p class="footer-disclaimer">BrickBot is not affiliated with The LEGO Group&reg;</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    (function () {
      'use strict';

      var params = new URLSearchParams(window.location.search);
      var partNum = params.get('part');
      var page = document.getElementById('part-page');

      if (!partNum) {
        BrickBotUI.showError(page, 'No part number provided. Go back and search for one!');
        return;
      }

      document.title = 'BrickBot — Part ' + partNum;
      BrickBotUI.showLoading(page);

      // Try to extract base part number for printed/decorated parts (e.g. "973pb0158" → "973")
      var isDecoratedPart = false;
      var originalPartNum = partNum;

      function getBasePartNum(num) {
        var match = num.match(/^(\d+)(pb|pr|pat)/i);
        return match ? match[1] : null;
      }

      // Fetch part with fallback for decorated/printed parts
      function fetchPartWithFallback(num) {
        return BrickBotAPI.getPart(num).catch(function () {
          var baseNum = getBasePartNum(num);
          if (baseNum && baseNum !== num) {
            isDecoratedPart = true;
            partNum = baseNum;
            return BrickBotAPI.getPart(baseNum);
          }
          throw new Error('Part not found');
        });
      }

      // Fetch part + colors first (required), sets separately (non-critical)
      Promise.all([
        fetchPartWithFallback(partNum),
        BrickBotAPI.getColors(partNum).catch(function () {
          // If decorated part failed, retry with base number
          var baseNum = getBasePartNum(originalPartNum);
          if (baseNum) return BrickBotAPI.getColors(baseNum);
          return { results: [] };
        }),
        BrickBotAPI.getSets(partNum).catch(function () {
          var baseNum = getBasePartNum(originalPartNum);
          if (baseNum) return BrickBotAPI.getSets(baseNum).catch(function () { return { results: [], count: 0 }; });
          return { results: [], count: 0 };
        })
      ]).then(function (results) {
        var part = results[0];
        var colorsData = results[1];
        var setsData = results[2];

        var colors = colorsData.results || [];
        var sets = setsData.results || [];
        var totalSets = setsData.count || sets.length;

        // Save to recent lookups
        BrickBotUI.addRecentLookup(partNum, part.name, part.part_img_url);

        // Build the page
        var html = '';

        // --- Part Header ---
        html += '<section class="part-header">';
        html += '  <div class="part-header-inner">';
        html += '    <div class="part-image-wrap">';
        if (part.part_img_url) {
          html += '    <img class="part-image" src="' + part.part_img_url + '" alt="' + BrickBotUI.escapeHtml(part.name) + '">';
        } else {
          html += '    <div class="part-image-placeholder">No image available</div>';
        }
        html += '    </div>';
        html += '    <div class="part-info">';
        html += '      <h1 class="part-name">' + BrickBotUI.escapeHtml(part.name) + '</h1>';
        html += '      <span class="part-number">#' + BrickBotUI.escapeHtml(part.part_num) + '</span>';
        html += '      <div class="part-stats">';
        html += '        <span class="stat-pill">' + colors.length + ' colors</span>';
        html += '        <span class="stat-pill">' + totalSets.toLocaleString() + ' sets</span>';
        html += '      </div>';
        html += '    </div>';
        html += '  </div>';
        if (isDecoratedPart) {
          html += '  <div style="max-width:900px;margin:12px auto 0;padding:8px 16px;background:#fffbe6;border-radius:10px;font-size:13px;color:#555;text-align:center;">';
          html += '    Showing base part \u2014 <strong>' + BrickBotUI.escapeHtml(originalPartNum) + '</strong> has a printed pattern.';
          html += '  </div>';
        }
        html += '</section>';

        // --- Color Swatches ---
        if (colors.length > 0) {
          html += '<section class="colors-section">';
          html += '  <h2 class="section-title">Available in ' + colors.length + ' colors</h2>';
          html += '  <div class="color-swatches">';
          colors.forEach(function (c) {
            var hex = '#' + (c.color_rgb || 'CCCCCC');
            var name = c.color_name || 'Unknown';
            var border = c.color_rgb === 'FFFFFF' ? '1px solid #ddd' : '1px solid transparent';
            html += '<div class="color-swatch" title="' + BrickBotUI.escapeHtml(name) + '" style="background:' + hex + ';border:' + border + ';">';
            html += '  <span class="color-tooltip">' + BrickBotUI.escapeHtml(name) + '</span>';
            html += '</div>';
          });
          html += '  </div>';
          html += '</section>';
        }

        // --- Sets Grid ---
        if (sets.length > 0) {
          html += '<section class="sets-section">';
          html += '  <h2 class="section-title">Found in ' + totalSets.toLocaleString() + ' sets</h2>';
          html += '  <div class="sets-grid" id="sets-grid">';
          sets.forEach(function (s) {
            var setUrl = 'https://rebrickable.com/sets/' + s.set_num + '/';
            html += '<a class="set-card" href="' + setUrl + '" target="_blank" rel="noopener">';
            if (s.set_img_url) {
              html += '  <img class="set-card-img" src="' + s.set_img_url + '" alt="' + BrickBotUI.escapeHtml(s.name) + '">';
            } else {
              html += '  <div class="set-card-img-placeholder">No image</div>';
            }
            html += '  <div class="set-card-name">' + BrickBotUI.escapeHtml(s.name) + '</div>';
            html += '  <div class="set-card-meta">' + (s.year || '') + ' &middot; ' + (s.num_parts || '?') + ' pcs</div>';
            html += '</a>';
          });
          html += '  </div>';

          if (totalSets > 12) {
            html += '<div class="sets-expand-wrap">';
            html += '  <button class="sets-expand-btn" id="show-all-sets">Show all ' + totalSets.toLocaleString() + ' sets</button>';
            html += '</div>';
          }
          html += '</section>';
        }

        // --- BrickBot Build Ideas ---
        html += '<section class="ideas-section">';
        html += '  <div class="ideas-card">';
        html += '    <div class="ideas-header">';
        html += '      <span class="ideas-icon">🤖</span>';
        html += '      <h2 class="ideas-title">BrickBot says...</h2>';
        html += '    </div>';

        // Age group selector
        html += '    <div class="ideas-controls">';
        html += '      <label class="ideas-label">Age group</label>';
        html += '      <div class="age-group-btns" id="age-group-btns">';
        html += '        <button class="age-btn" data-age="Ages 5-8">Ages 5\u20138</button>';
        html += '        <button class="age-btn active" data-age="Ages 9-12">Ages 9\u201312</button>';
        html += '        <button class="age-btn" data-age="Ages 13+">Ages 13+</button>';
        html += '      </div>';

        // Topic chips
        html += '      <label class="ideas-label">Topics</label>';
        html += '      <div class="topic-chips" id="topic-chips">';
        var topicsList = ['Animals', 'Vehicles', 'Buildings', 'Space', 'Fantasy', 'Robots', 'Nature', 'Food', 'Sports'];
        topicsList.forEach(function (t) {
          html += '<button class="topic-chip" data-topic="' + t + '">' + t + '</button>';
        });
        html += '      </div>';

        // Get ideas button
        html += '      <button class="get-ideas-btn" id="get-ideas-btn">Get ideas \u2192</button>';
        html += '    </div>';

        // Results container
        html += '    <div class="ideas-results" id="ideas-results"></div>';

        // Follow-up chat
        html += '    <div class="chat-section" id="chat-section" style="display:none;">';
        html += '      <div class="chat-messages" id="chat-messages"></div>';
        html += '      <form class="chat-form" id="chat-form">';
        html += '        <input type="text" class="chat-input" id="chat-input" placeholder="Ask BrickBot for more ideas..." autocomplete="off">';
        html += '        <button type="submit" class="chat-send-btn">Send</button>';
        html += '      </form>';
        html += '    </div>';

        html += '  </div>';
        html += '</section>';

        // --- Add to Bench ---
        html += '<div class="add-to-bench-row">';
        html += '  <button class="btn-add-bench" id="btn-add-bench">+ Add to My Bench</button>';
        html += '  <span class="bench-hint">Add this piece to your bench and get ideas for combinations</span>';
        html += '</div>';

        page.innerHTML = html;

        // --- BrickBot Ideas Logic ---
        var selectedAge = 'Ages 9-12';
        var selectedTopics = [];
        var conversationHistory = [];

        // Age group buttons
        var ageBtns = document.querySelectorAll('.age-btn');
        ageBtns.forEach(function (btn) {
          btn.addEventListener('click', function () {
            ageBtns.forEach(function (b) { b.classList.remove('active'); });
            btn.classList.add('active');
            selectedAge = btn.getAttribute('data-age');
          });
        });

        // Topic chips (multi-select)
        var topicChips = document.querySelectorAll('.topic-chip');
        topicChips.forEach(function (chip) {
          chip.addEventListener('click', function () {
            var topic = chip.getAttribute('data-topic');
            chip.classList.toggle('active');
            if (chip.classList.contains('active')) {
              selectedTopics.push(topic);
            } else {
              selectedTopics = selectedTopics.filter(function (t) { return t !== topic; });
            }
          });
        });

        // Get Ideas button
        var getIdeasBtn = document.getElementById('get-ideas-btn');
        var ideasResults = document.getElementById('ideas-results');
        var chatSection = document.getElementById('chat-section');

        getIdeasBtn.addEventListener('click', function () {
          getIdeasBtn.disabled = true;
          getIdeasBtn.textContent = 'Thinking...';
          ideasResults.innerHTML =
            '<div class="ideas-loading">' +
              '<div class="loading-spinner"></div>' +
              '<p class="loading-text">BrickBot is thinking...</p>' +
            '</div>';

          conversationHistory = [];

          BrickBotAPI.getIdeas(
            part.name, part.part_num, '', selectedAge, selectedTopics, []
          ).then(function (data) {
            var ideas = BrickBotUI.parseIdeas(data.ideas);

            // Store assistant response in conversation history
            conversationHistory.push(
              { role: 'user', content: 'Give me 5 build ideas for ' + part.name + ' (' + part.part_num + ') for ' + selectedAge + '.' },
              { role: 'assistant', content: data.ideas }
            );

            if (ideas.length === 0) {
              ideasResults.innerHTML = '<p class="ideas-raw">' + BrickBotUI.escapeHtml(data.ideas) + '</p>';
            } else {
              var cardsHtml = '';
              ideas.forEach(function (idea, i) {
                var badgeColor = BrickBotUI.difficultyColor(idea.difficulty);
                cardsHtml += '<div class="idea-card">';
                cardsHtml += '  <div class="idea-card-header">';
                cardsHtml += '    <span class="idea-number">IDEA ' + (i + 1) + '</span>';
                cardsHtml += '    <span class="idea-difficulty" style="background:' + badgeColor + ';">' + BrickBotUI.escapeHtml(idea.difficulty) + '</span>';
                cardsHtml += '  </div>';
                cardsHtml += '  <h3 class="idea-name">' + BrickBotUI.escapeHtml(idea.name) + '</h3>';
                cardsHtml += '  <p class="idea-desc">' + BrickBotUI.escapeHtml(idea.description) + '</p>';
                cardsHtml += '</div>';
              });
              ideasResults.innerHTML = cardsHtml;
            }

            // Show chat section
            chatSection.style.display = 'block';

            getIdeasBtn.disabled = false;
            getIdeasBtn.textContent = 'Get ideas \u2192';
          }).catch(function (err) {
            ideasResults.innerHTML =
              '<p class="ideas-error">BrickBot is taking a nap \u2014 try again in a second!</p>' +
              '<button class="retry-btn" onclick="document.getElementById(\'get-ideas-btn\').click()">Retry</button>';
            getIdeasBtn.disabled = false;
            getIdeasBtn.textContent = 'Get ideas \u2192';
          });
        });

        // Follow-up chat
        var chatForm = document.getElementById('chat-form');
        var chatInput = document.getElementById('chat-input');
        var chatMessages = document.getElementById('chat-messages');

        chatForm.addEventListener('submit', function (e) {
          e.preventDefault();
          var message = chatInput.value.trim();
          if (!message) return;

          // Show user message
          chatMessages.innerHTML +=
            '<div class="chat-bubble chat-user">' +
              '<p>' + BrickBotUI.escapeHtml(message) + '</p>' +
            '</div>';
          chatInput.value = '';

          // Show typing indicator
          chatMessages.innerHTML +=
            '<div class="chat-bubble chat-bot chat-typing" id="chat-typing">' +
              '<p>BrickBot is thinking...</p>' +
            '</div>';
          chatMessages.scrollTop = chatMessages.scrollHeight;

          // Add user message to history
          conversationHistory.push({ role: 'user', content: message });

          BrickBotAPI.chatFollowup(message, conversationHistory).then(function (data) {
            // Remove typing indicator
            var typing = document.getElementById('chat-typing');
            if (typing) typing.remove();

            // Add bot reply
            conversationHistory.push({ role: 'assistant', content: data.reply });
            chatMessages.innerHTML +=
              '<div class="chat-bubble chat-bot">' +
                '<span class="chat-bot-icon">🤖</span>' +
                '<p>' + BrickBotUI.escapeHtml(data.reply) + '</p>' +
              '</div>';
            chatMessages.scrollTop = chatMessages.scrollHeight;
          }).catch(function () {
            var typing = document.getElementById('chat-typing');
            if (typing) typing.remove();
            chatMessages.innerHTML +=
              '<div class="chat-bubble chat-bot">' +
                '<p>Oops! BrickBot couldn\u2019t respond. Try again!</p>' +
              '</div>';
          });
        });

        // --- Buy links ---
        var buySection = document.getElementById('buy-links');
        var blBtn = document.getElementById('bricklink-btn');
        var azBtn = document.getElementById('amazon-btn');
        blBtn.href = 'https://www.bricklink.com/v2/catalog/catalogitem.page?P=' + encodeURIComponent(part.part_num);
        azBtn.href = 'https://www.amazon.com/s?k=LEGO+' + encodeURIComponent(part.name);
        buySection.style.display = 'flex';

        // --- Add to Bench ---
        var addBenchBtn = document.getElementById('btn-add-bench');
        addBenchBtn.addEventListener('click', function () {
          var benchPieces = [];
          try { benchPieces = JSON.parse(localStorage.getItem('brickbot_bench_pieces') || '[]'); } catch (e) {}

          // Check duplicate
          var already = benchPieces.some(function (p) { return p.part_num === part.part_num; });
          if (already) {
            showPartToast('Already on your bench! <a href="bench.html">View Bench \u2192</a>');
            return;
          }
          if (benchPieces.length >= 30) {
            showPartToast('Bench is full! Max 30 pieces.');
            return;
          }

          benchPieces.push(part);
          try { localStorage.setItem('brickbot_bench_pieces', JSON.stringify(benchPieces)); } catch (e) {}

          addBenchBtn.textContent = 'Added!';
          addBenchBtn.disabled = true;
          updateBenchBadge();
          showPartToast('Added ' + BrickBotUI.escapeHtml(part.name) + ' to your bench! <a href="bench.html">View Bench \u2192</a>');
        });

        // --- Bench badge ---
        function updateBenchBadge() {
          try {
            var pieces = JSON.parse(localStorage.getItem('brickbot_bench_pieces') || '[]');
            var badge = document.getElementById('bench-badge');
            if (badge && pieces.length > 0) {
              badge.textContent = pieces.length;
              badge.style.display = 'inline-block';
            } else if (badge) {
              badge.style.display = 'none';
            }
          } catch (e) {}
        }
        updateBenchBadge();

        // --- Toast for part page ---
        function showPartToast(htmlContent) {
          var existing = document.querySelector('.bench-toast');
          if (existing) existing.remove();
          var toast = document.createElement('div');
          toast.className = 'bench-toast';
          toast.innerHTML = htmlContent;
          document.body.appendChild(toast);
          requestAnimationFrame(function () { toast.classList.add('visible'); });
          setTimeout(function () {
            toast.classList.remove('visible');
            setTimeout(function () { toast.remove(); }, 300);
          }, 3500);
        }

        // --- Show all sets handler ---
        var showAllBtn = document.getElementById('show-all-sets');
        if (showAllBtn) {
          showAllBtn.addEventListener('click', function () {
            showAllBtn.textContent = 'Loading...';
            showAllBtn.disabled = true;
            // Fetch more sets (larger page size)
            BrickBotAPI.getSets(partNum, 200).then(function (allData) {
              var allSets = allData.results || [];
              var grid = document.getElementById('sets-grid');
              grid.innerHTML = '';
              allSets.forEach(function (s) {
                var setUrl = 'https://rebrickable.com/sets/' + s.set_num + '/';
                var card = document.createElement('a');
                card.className = 'set-card';
                card.href = setUrl;
                card.target = '_blank';
                card.rel = 'noopener';
                var inner = '';
                if (s.set_img_url) {
                  inner += '<img class="set-card-img" src="' + s.set_img_url + '" alt="' + BrickBotUI.escapeHtml(s.name) + '">';
                } else {
                  inner += '<div class="set-card-img-placeholder">No image</div>';
                }
                inner += '<div class="set-card-name">' + BrickBotUI.escapeHtml(s.name) + '</div>';
                inner += '<div class="set-card-meta">' + (s.year || '') + ' &middot; ' + (s.num_parts || '?') + ' pcs</div>';
                card.innerHTML = inner;
                grid.appendChild(card);
              });
              showAllBtn.parentElement.remove();
            }).catch(function () {
              showAllBtn.textContent = 'Failed to load — try again';
              showAllBtn.disabled = false;
            });
          });
        }

      }).catch(function (err) {
        BrickBotUI.showError(page, "BrickBot couldn\u2019t find that part number. Double-check the number on the bottom of the piece.");
      });
    })();
  </script>
</body>
</html>
